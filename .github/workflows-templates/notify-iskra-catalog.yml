# Place this file at .github/workflows/notify-iskra-catalog.yml in EACH
# firmware repo (ci-clop-firmware, headlamp-firmware, ...). When the repo
# publishes a release, it fires a `repository_dispatch` event at iskra-catalog
# so the central catalog regenerates within seconds.
#
# Required secret in this firmware repo:
#   ISKRA_CATALOG_DISPATCH_TOKEN   GitHub fine-grained PAT with
#                                  access to oleksandrmaslov/iskra-catalog and
#                                  "Contents: read and write" permission.
#
# To create the PAT:
#   https://github.com/settings/personal-access-tokens/new
#   Resource owner:  oleksandrmaslov
#   Repository access: only-select-repos → iskra-catalog
#   Permissions: Repository → Contents: Read and write
#   Expiry: 1 year (set a calendar reminder)
#
# After creating, paste the value into each firmware repo at:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: ISKRA_CATALOG_DISPATCH_TOKEN

name: notify iskra-catalog on release

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch at iskra-catalog
        env:
          DISPATCH_TOKEN: ${{ secrets.ISKRA_CATALOG_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/oleksandrmaslov/iskra-catalog/dispatches" \
            -d @- <<EOF
          {
            "event_type": "firmware-released",
            "client_payload": {
              "source_repo": "${{ github.repository }}",
              "tag":         "${{ github.event.release.tag_name }}",
              "name":        "${{ github.event.release.name }}",
              "released_at": "${{ github.event.release.published_at }}"
            }
          }
          EOF
          echo "Notified iskra-catalog of ${{ github.repository }}@${{ github.event.release.tag_name }}"
